name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev \
          libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
          libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
          autoconf automake libtool pkg-config cmake gettext
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 sh python-for-android

      - name: Build with Buildozer
        run: |
          # The Forced Fix: Eto yung gagawa ng folder na hinahanap ng error mo
          mkdir -p .buildozer/android/platform
          ln -s /home/runner/.local/bin/p4a .buildozer/android/platform/python-for-android
          
          export PATH=$PATH:~/.local/bin
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: USAccounting-Package
          path: bin/*.apk
